version: '3.8'

services:
  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: devsearch-meilisearch
    ports:
      - '7700:7700'
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped

volumes:
  meilisearch_data: